name: Build Android Termux OpenCV

on:
  workflow_dispatch:
    inputs:
      opencv_ref:
        description: 'OpenCV tag or branch'
        required: false
        default: '4.10.0'
      android_api:
        description: 'Android API level'
        required: false
        default: '24'
      android_abi:
        description: 'Android ABI'
        required: false
        default: 'arm64-v8a'
      python_version:
        description: 'Target Python version'
        required: false
        default: '3.13'
      python_include_dir:
        description: 'Target Python include dir (legacy/manual override; usually leave empty when using archive)'
        required: false
        default: ''
      python_library:
        description: 'Target libpython path (legacy/manual override; usually leave empty when using archive)'
        required: false
        default: ''
      python_packages_path:
        description: 'Target site-packages path (metadata/reference only; CI installs into runner-local staging dir)'
        required: false
        default: ''
      python_numpy_include_dirs:
        description: 'Target NumPy include dirs (legacy/manual override; usually leave empty when using archive)'
        required: false
        default: ''
      python_ext_suffix:
        description: 'Target Python extension suffix; leave empty to auto-derive from version'
        required: false
        default: ''
      python_soabi:
        description: 'Target Python SOABI; leave empty to auto-derive from version'
        required: false
        default: ''
      python_dev_archive_url:
        description: 'URL to tar.gz containing target include/pythonX.Y and lib/libpythonX.Y.so'
        required: false
        default: ''
      python_numpy_archive_url:
        description: 'URL to tar.gz containing target numpy/_core/include'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up host Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            cmake \
            curl \
            unzip \
            zip \
            pkg-config \
            git
          python --version
          python -m pip --version

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Resolve Android NDK path
        run: |
          NDK_BUILD_PATH="$(command -v ndk-build || true)"
          echo "ndk-build=$NDK_BUILD_PATH"
          test -n "$NDK_BUILD_PATH" || { echo 'ndk-build not found in PATH'; exit 1; }

          TOOLCHAIN_FILE="$(find -L /opt/hostedtoolcache/ndk -path '*/build/cmake/android.toolchain.cmake' | head -n 1)"
          echo "toolchain_file=$TOOLCHAIN_FILE"
          test -n "$TOOLCHAIN_FILE" || { echo 'android.toolchain.cmake not found'; exit 1; }

          ANDROID_NDK="$(cd "$(dirname "$TOOLCHAIN_FILE")/../.." && pwd)"
          echo "ANDROID_NDK=$ANDROID_NDK"
          ls -la "$ANDROID_NDK/build/cmake"
          echo "ANDROID_NDK=$ANDROID_NDK" >> "$GITHUB_ENV"

      - name: Resolve Python config
        id: pycfg
        shell: bash
        run: |
          set -euo pipefail
          PYVER="${{ github.event.inputs.python_version || '3.13' }}"
          if [ -z "$PYVER" ]; then
            PYVER='3.13'
          fi
          PYNODOT="${PYVER/.}"
          PYMAJOR="${PYVER%%.*}"
          PYMINOR="${PYVER#*.}"
          PYINCDIR="python${PYVER}"
          if [ -n "${{ github.event.inputs.python_ext_suffix }}" ]; then
            PYEXT="${{ github.event.inputs.python_ext_suffix }}"
          else
            PYEXT=".cpython-${PYNODOT}.so"
          fi
          if [ -n "${{ github.event.inputs.python_soabi }}" ]; then
            PYSOABI="${{ github.event.inputs.python_soabi }}"
          else
            PYSOABI="cpython-${PYNODOT}"
          fi
          if [ -n "${{ github.event.inputs.python_packages_path }}" ]; then
            PYPKG="${{ github.event.inputs.python_packages_path }}"
          else
            PYPKG="/data/data/com.termux/files/usr/lib/python${PYVER}/site-packages"
          fi
          echo "python_version=$PYVER" >> "$GITHUB_OUTPUT"
          echo "python_nodot=$PYNODOT" >> "$GITHUB_OUTPUT"
          echo "python_major=$PYMAJOR" >> "$GITHUB_OUTPUT"
          echo "python_minor=$PYMINOR" >> "$GITHUB_OUTPUT"
          echo "python_include_dirname=$PYINCDIR" >> "$GITHUB_OUTPUT"
          echo "python_ext_suffix=$PYEXT" >> "$GITHUB_OUTPUT"
          echo "python_soabi=$PYSOABI" >> "$GITHUB_OUTPUT"
          echo "python_packages_path=$PYPKG" >> "$GITHUB_OUTPUT"

      - name: Fetch OpenCV sources
        env:
          OPENCV_REF: ${{ github.event.inputs.opencv_ref || '4.10.0' }}
          WORKDIR: ${{ github.workspace }}
        run: bash scripts/fetch_sources.sh

      - name: Prepare pseudo-Termux prefix
        run: |
          mkdir -p "$GITHUB_WORKSPACE/termux-prefix/lib/python${{ steps.pycfg.outputs.python_version }}/site-packages"
          echo "TERMUX_PREFIX=$GITHUB_WORKSPACE/termux-prefix" >> "$GITHUB_ENV"

      - name: Prepare target Python dev files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/termux-python-dev"
          if [ -n "${{ github.event.inputs.python_dev_archive_url }}" ]; then
            curl -L --fail "${{ github.event.inputs.python_dev_archive_url }}" -o "$GITHUB_WORKSPACE/termux-python-dev.tar.gz"
            tar -xzf "$GITHUB_WORKSPACE/termux-python-dev.tar.gz" -C "$GITHUB_WORKSPACE/termux-python-dev"
          elif [ -n "${{ github.event.inputs.python_include_dir }}" ] && [ -f "${{ github.event.inputs.python_include_dir }}/Python.h" ] && [ -n "${{ github.event.inputs.python_library }}" ] && [ -f "${{ github.event.inputs.python_library }}" ]; then
            mkdir -p "$GITHUB_WORKSPACE/termux-python-dev/include" "$GITHUB_WORKSPACE/termux-python-dev/lib"
            cp -a "${{ github.event.inputs.python_include_dir }}" "$GITHUB_WORKSPACE/termux-python-dev/include/"
            cp -a "${{ github.event.inputs.python_library }}" "$GITHUB_WORKSPACE/termux-python-dev/lib/"
          else
            echo 'No usable target Python dev files supplied. Set python_dev_archive_url or provide local existing include/lib paths.'
            exit 1
          fi
          test -f "$GITHUB_WORKSPACE/termux-python-dev/include/${{ steps.pycfg.outputs.python_include_dirname }}/Python.h"
          test -f "$GITHUB_WORKSPACE/termux-python-dev/lib/libpython${{ steps.pycfg.outputs.python_version }}.so"

      - name: Prepare target NumPy headers
        run: |
          mkdir -p "$GITHUB_WORKSPACE/termux-numpy-dev"
          if [ -n "${{ github.event.inputs.python_numpy_archive_url }}" ]; then
            curl -L --fail "${{ github.event.inputs.python_numpy_archive_url }}" -o "$GITHUB_WORKSPACE/termux-numpy-dev.tar.gz"
            tar -xzf "$GITHUB_WORKSPACE/termux-numpy-dev.tar.gz" -C "$GITHUB_WORKSPACE/termux-numpy-dev"
          elif [ -n "${{ github.event.inputs.python_numpy_include_dirs }}" ] && [ -f "${{ github.event.inputs.python_numpy_include_dirs }}/numpy/ndarrayobject.h" ]; then
            mkdir -p "$GITHUB_WORKSPACE/termux-numpy-dev/numpy/_core"
            cp -a "${{ github.event.inputs.python_numpy_include_dirs }}" "$GITHUB_WORKSPACE/termux-numpy-dev/numpy/_core/"
          else
            echo 'No usable target NumPy headers supplied. Set python_numpy_archive_url or provide local existing numpy include path.'
            exit 1
          fi
          test -f "$GITHUB_WORKSPACE/termux-numpy-dev/numpy/_core/include/numpy/ndarrayobject.h"

      - name: Show target inputs
        run: |
          echo "host_python=$(which python)"
          python --version
          echo "python_version=${{ steps.pycfg.outputs.python_version }}"
          echo "python_include_dir=${{ github.event.inputs.python_include_dir }}"
          echo "python_library=${{ github.event.inputs.python_library }}"
          echo "python_packages_path=${{ steps.pycfg.outputs.python_packages_path }}"
          echo "python_numpy_include_dirs=${{ github.event.inputs.python_numpy_include_dirs }}"
          echo "python_ext_suffix=${{ steps.pycfg.outputs.python_ext_suffix }}"
          echo "python_soabi=${{ steps.pycfg.outputs.python_soabi }}"
          echo "python_dev_archive_url=${{ github.event.inputs.python_dev_archive_url }}"
          echo "python_numpy_archive_url=${{ github.event.inputs.python_numpy_archive_url }}"
          ls -lah "$GITHUB_WORKSPACE/termux-python-dev/include/${{ steps.pycfg.outputs.python_include_dirname }}" | sed -n '1,20p'
          ls -lah "$GITHUB_WORKSPACE/termux-python-dev/lib/libpython${{ steps.pycfg.outputs.python_version }}.so"
          ls -lah "$GITHUB_WORKSPACE/termux-numpy-dev/numpy/_core/include/numpy" | sed -n '1,20p'

      - name: Configure and build
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          ANDROID_API: ${{ github.event.inputs.android_api || '24' }}
          ANDROID_ABI: ${{ github.event.inputs.android_abi || 'arm64-v8a' }}
          PYTHON_VERSION: ${{ steps.pycfg.outputs.python_version }}
          PYTHON3_EXECUTABLE: ${{ env.pythonLocation }}/bin/python
          PYTHON_INCLUDE_DIR: ${{ github.workspace }}/termux-python-dev/include/${{ steps.pycfg.outputs.python_include_dirname }}
          PYTHON_LIBRARY: ${{ github.workspace }}/termux-python-dev/lib/libpython${{ steps.pycfg.outputs.python_version }}.so
          PYTHON_PACKAGES_PATH: ${{ steps.pycfg.outputs.python_packages_path }}
          PYTHON_NUMPY_INCLUDE_DIRS: ${{ github.workspace }}/termux-numpy-dev/numpy/_core/include
          PYTHON_EXT_SUFFIX: ${{ steps.pycfg.outputs.python_ext_suffix }}
          PYTHON_SOABI: ${{ steps.pycfg.outputs.python_soabi }}
          OPENCV_ENABLE_ANDROID_PYTHON: 'ON'
          TERMUX_PREFIX: ${{ env.TERMUX_PREFIX }}
          BUILD_DIR: ${{ github.workspace }}/build
          INSTALL_PREFIX: ${{ github.workspace }}/out/install
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK"
          echo "PYTHON3_EXECUTABLE=$PYTHON3_EXECUTABLE"
          "$PYTHON3_EXECUTABLE" --version
          test -n "$ANDROID_NDK" || { echo 'ANDROID_NDK is required'; exit 1; }
          test -f "$PYTHON_INCLUDE_DIR/Python.h" || { echo "Python.h not found at $PYTHON_INCLUDE_DIR"; exit 1; }
          test -f "$PYTHON_LIBRARY" || { echo "libpython not found at $PYTHON_LIBRARY"; exit 1; }
          bash scripts/configure_and_build.sh

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p artifacts
          [ -d build ] && tar -czf artifacts/build.tar.gz build || true
          [ -d out ] && tar -czf artifacts/out.tar.gz out || true
          [ -f build/build.log ] && cp -f build/build.log artifacts/ || true
          [ -f build/install.log ] && cp -f build/install.log artifacts/ || true
          find . -name 'cv2*.so' -print -exec cp -f {} artifacts/ \; || true
          find . -path '*/site-packages/*' -type f -print | sed -n '1,200p' || true
          find . -maxdepth 3 -type f \( -name 'CMakeCache.txt' -o -name '*.log' \) -print -exec cp -f {} artifacts/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencv-android-termux-py${{ steps.pycfg.outputs.python_nodot }}-${{ github.run_number }}
          path: artifacts/
