name: Build Android Termux OpenCV

on:
  workflow_dispatch:
    inputs:
      opencv_ref:
        description: 'OpenCV tag or branch'
        required: false
        default: '4.10.0'
      android_api:
        description: 'Android API level'
        required: false
        default: '24'
      android_abi:
        description: 'Android ABI'
        required: false
        default: 'arm64-v8a'
      python_version:
        description: 'Target Python version'
        required: false
        default: '3.13'
      python_include_dir:
        description: 'Target Python include dir (Termux/Android target)'
        required: false
        default: ''
      python_library:
        description: 'Target libpython path (Termux/Android target)'
        required: false
        default: ''
      python_packages_path:
        description: 'Target site-packages path'
        required: false
        default: '/data/data/com.termux/files/usr/lib/python3.13/site-packages'
      python_numpy_include_dirs:
        description: 'Target NumPy include dirs'
        required: false
        default: ''
      python_ext_suffix:
        description: 'Target Python extension suffix (example: .cpython-313.so)'
        required: false
        default: '.so'
      python_soabi:
        description: 'Target Python SOABI (example: cpython-313)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up host Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            cmake \
            curl \
            unzip \
            zip \
            pkg-config \
            git
          python --version
          python -m pip --version

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Resolve Android NDK path
        run: |
          NDK_BUILD_PATH="$(command -v ndk-build || true)"
          echo "ndk-build=$NDK_BUILD_PATH"
          test -n "$NDK_BUILD_PATH" || { echo 'ndk-build not found in PATH'; exit 1; }

          TOOLCHAIN_FILE="$(find -L /opt/hostedtoolcache/ndk -path '*/build/cmake/android.toolchain.cmake' | head -n 1)"
          echo "toolchain_file=$TOOLCHAIN_FILE"
          test -n "$TOOLCHAIN_FILE" || { echo 'android.toolchain.cmake not found'; exit 1; }

          ANDROID_NDK="$(cd "$(dirname "$TOOLCHAIN_FILE")/../.." && pwd)"
          echo "ANDROID_NDK=$ANDROID_NDK"
          ls -la "$ANDROID_NDK/build/cmake"
          echo "ANDROID_NDK=$ANDROID_NDK" >> "$GITHUB_ENV"

      - name: Fetch OpenCV sources
        env:
          OPENCV_REF: ${{ github.event.inputs.opencv_ref || '4.10.0' }}
          WORKDIR: ${{ github.workspace }}
        run: bash scripts/fetch_sources.sh

      - name: Prepare pseudo-Termux prefix
        run: |
          mkdir -p "$GITHUB_WORKSPACE/termux-prefix/lib/python3.13/site-packages"
          echo "TERMUX_PREFIX=$GITHUB_WORKSPACE/termux-prefix" >> "$GITHUB_ENV"

      - name: Show target inputs
        run: |
          echo "host_python=$(which python)"
          python --version
          echo "python_version=${{ github.event.inputs.python_version || '3.13' }}"
          echo "python_include_dir=${{ github.event.inputs.python_include_dir }}"
          echo "python_library=${{ github.event.inputs.python_library }}"
          echo "python_packages_path=${{ github.event.inputs.python_packages_path || '/data/data/com.termux/files/usr/lib/python3.13/site-packages' }}"
          echo "python_numpy_include_dirs=${{ github.event.inputs.python_numpy_include_dirs }}"
          echo "python_ext_suffix=${{ github.event.inputs.python_ext_suffix || '.so' }}"
          echo "python_soabi=${{ github.event.inputs.python_soabi }}"

      - name: Configure and build
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          ANDROID_API: ${{ github.event.inputs.android_api || '24' }}
          ANDROID_ABI: ${{ github.event.inputs.android_abi || 'arm64-v8a' }}
          PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.13' }}
          PYTHON3_EXECUTABLE: ${{ env.pythonLocation }}/bin/python
          PYTHON_INCLUDE_DIR: ${{ github.event.inputs.python_include_dir }}
          PYTHON_LIBRARY: ${{ github.event.inputs.python_library }}
          PYTHON_PACKAGES_PATH: ${{ github.event.inputs.python_packages_path || '/data/data/com.termux/files/usr/lib/python3.13/site-packages' }}
          PYTHON_NUMPY_INCLUDE_DIRS: ${{ github.event.inputs.python_numpy_include_dirs }}
          PYTHON_EXT_SUFFIX: ${{ github.event.inputs.python_ext_suffix || '.so' }}
          PYTHON_SOABI: ${{ github.event.inputs.python_soabi }}
          OPENCV_ENABLE_ANDROID_PYTHON: 'ON'
          TERMUX_PREFIX: ${{ env.TERMUX_PREFIX }}
          BUILD_DIR: ${{ github.workspace }}/build
          INSTALL_PREFIX: ${{ github.workspace }}/out/install
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK"
          echo "PYTHON3_EXECUTABLE=$PYTHON3_EXECUTABLE"
          "$PYTHON3_EXECUTABLE" --version
          test -n "$ANDROID_NDK" || { echo 'ANDROID_NDK is required'; exit 1; }
          test -n "$PYTHON_INCLUDE_DIR" || { echo 'python_include_dir is required for a real Termux Python 3.13 target build'; exit 1; }
          test -n "$PYTHON_LIBRARY" || { echo 'python_library is required for a real Termux Python 3.13 target build'; exit 1; }
          bash scripts/configure_and_build.sh

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p artifacts
          [ -d build ] && tar -czf artifacts/build.tar.gz build || true
          [ -d out ] && tar -czf artifacts/out.tar.gz out || true
          [ -f build/build.log ] && cp -f build/build.log artifacts/ || true
          [ -f build/install.log ] && cp -f build/install.log artifacts/ || true
          find . -name 'cv2*.so' -print -exec cp -f {} artifacts/ \; || true
          find . -path '*/site-packages/*' -type f -print | sed -n '1,200p' || true
          find . -maxdepth 3 -type f \( -name 'CMakeCache.txt' -o -name '*.log' \) -print -exec cp -f {} artifacts/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencv-android-termux-py313-${{ github.run_number }}
          path: artifacts/
